name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "scripts/**"
      - "test/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "tsconfig.json"
      - ".prettierrc"
      - ".editorconfig"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test --max-concurrency=1 2>&1 | tee test-output.txt

      - name: Lint and typecheck
        run: bun run check:all

      - name: Build CLI
        run: bun run build

      - name: Parse test results
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: results
        run: |
          set -euo pipefail

          PASS=$(awk '/^[[:space:]]*[0-9]+ pass$/ { print $1 }' test-output.txt | tail -n1)
          FAIL=$(awk '/^[[:space:]]*[0-9]+ fail$/ { print $1 }' test-output.txt | tail -n1)
          COVERAGE=$(awk -F'|' '/All files/ { gsub(/[ \t]/, "", $3); print $3 }' test-output.txt | tail -n1)

          [ -n "${PASS}" ] || { echo "::error::Could not parse passed test count"; exit 1; }
          [ -n "${FAIL}" ] || { echo "::error::Could not parse failed test count"; exit 1; }
          [ -n "${COVERAGE}" ] || { echo "::error::Could not parse line coverage"; exit 1; }

          COV_INT=${COVERAGE%.*}
          if [ "$COV_INT" -ge 90 ]; then COV_COLOR="darkgreen"
          elif [ "$COV_INT" -ge 80 ]; then COV_COLOR="green"
          elif [ "$COV_INT" -ge 70 ]; then COV_COLOR="yellow"
          else COV_COLOR="red"; fi

          if [ "$FAIL" = "0" ]; then
            TEST_COLOR="brightgreen"
            TEST_MSG="${PASS} passed"
          else
            TEST_COLOR="red"
            TEST_MSG="${FAIL} failed"
          fi

          mkdir -p badges

          cat > badges/qq-tests.json <<EOF
          { "schemaVersion": 1, "label": "tests", "message": "${TEST_MSG}", "color": "${TEST_COLOR}" }
          EOF

          cat > badges/qq-coverage.json <<EOF
          { "schemaVersion": 1, "label": "coverage", "message": "${COVERAGE}%", "color": "${COV_COLOR}" }
          EOF

      - name: Publish badges
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          cd badges
          git init -b badges
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No badge changes to publish."
            exit 0
          fi
          git commit -m "update badges"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" badges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
